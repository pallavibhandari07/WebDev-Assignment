<!DOCTYPE html>
<html>
<head>
    <title>Modern Chat App</title>
    <link rel="stylesheet" href="pallavi.css">
</head>
<body>

<div class="chat-wrapper">

    <!-- Header with Profile -->
    <div class="chat-header">
        <div class="profile">
            <div class="profile-circle">PB</div>
            <div class="profile-name">Pallavi Bhandari</div>
        </div>
    </div>

    <!-- Chat Messages -->
    <div id="chatBox" class="chat-box"></div>

    <!-- Input Area -->
    <div class="chat-input">
        <input type="text" id="messageInput" placeholder="Type a message...">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script src="pallavi.js"></script>
</body>
</html>
